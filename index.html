<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Whereabouts? — find your neighborhood</title>
  </head>
  <body>
    <div id="map"></div>
    <aside id="panel">
      <header>
        <h1>Whereabouts? · San Francisco</h1>
        <p class="tagline">Find a neighborhood that minimizes your weekly travel.</p>
        <div id="matrix-status" class="status"></div>
      </header>
      <section id="destinations-section">
        <div class="row between">
          <h2>Destinations</h2>
          <button id="add-dest-btn" type="button" class="toggle">+ Add</button>
        </div>
        <div id="preset-chains" class="preset-chains">
          <select id="preset-select"></select>
        </div>
        <div id="destinations-list"></div>
        <button id="done-btn" type="button" class="primary" disabled>Compute travel times</button>
      </section>
      <section id="results-section" hidden>
        <h2>Results</h2>
        <div id="legend"></div>
        <div id="cap-control">
          <label for="cap-slider">Cap max weekly travel: <span id="cap-value">—</span></label>
          <input id="cap-slider" type="range" step="1" />
        </div>
        <button id="hood-btn" type="button" class="toggle">Choose a hood</button>
        <button id="reset-btn" type="button" class="secondary">Clear results</button>
      </section>
    </aside>
    <div id="popup-root"></div>
    <div id="batch-banner" hidden>
      <span id="batch-banner-text">0 selected</span>
      <button id="batch-confirm-btn" type="button" class="batch-confirm">Delete</button>
      <button id="batch-cancel-btn" type="button">Cancel</button>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
